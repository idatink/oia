app = "oia-whatsapp"
primary_region = "lhr"

[build]

[env]
  NIA_API_URL = "https://oia-dashboard-beryl.vercel.app"
  NIA_WEB_URL = "https://oia-web-eight.vercel.app"
  OPENCLAW_STATE_DIR = "/data"
  # Cap output-token reservation so OpenRouter's upfront credit hold can't 402
  # against a limited key. WhatsApp replies are short + chunked, so 2000 is ample;
  # a smaller reserve means a thin balance stops blocking mid-intake (was 16000).
  OPENROUTER_DEFAULT_MAX_TOKENS = "2000"

[[mounts]]
  source = "openclaw_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
